<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>最強スクリプトチェッカー</title>

<style>

body {

  margin: 0;

  font-family: sans-serif;

  background: #343541;

  color: white;

}

.chat {

  padding: 10px;

  padding-bottom: 100px;

}

.user, .ai {

  padding: 12px;

  margin: 8px;

  border-radius: 10px;

  max-width: 90%;

  white-space: pre-wrap;

}

.user { background: #444654; margin-left: auto; }

.ai { background: #3e3f4b; }

.input-area {

  position: fixed;

  bottom: 0;

  width: 100%;

  display: flex;

  background: #343541;

  padding: 10px;

}

textarea {

  flex: 1;

  height: 60px;

  border-radius: 8px;

  border: none;

  padding: 10px;

}

button {

  margin-left: 8px;

  padding: 10px;

  border-radius: 8px;

  border: none;

  background: #19c37d;

  font-weight: bold;

}

/* ハイライト */

.danger { color: #ff4d4d; font-weight: bold; }

.warn { color: #ffd166; font-weight: bold; }

pre {

  background: black;

  padding: 10px;

  overflow-x: auto;

}

</style>

</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">

  <textarea id="code" placeholder="コード or URLを貼ってください"></textarea>

  <button onclick="send()">送信</button>

</div>

<script>

// ===== ハイライト =====

function highlightCode(code) {

  let h = code;

  const danger = ["loadstring","HttpGet","webhook","request","setclipboard","getgenv","LocalPlayer"];

  danger.forEach(w=>{

    h = h.replace(new RegExp(w,"gi"), `<span class="danger">${w}</span>`);

  });

  const warn = ["game:","Instance.new","workspace","Players"];

  warn.forEach(w=>{

    h = h.replace(new RegExp(w,"gi"), `<span class="warn">${w}</span>`);

  });

  h = h.replace(/https?:\/\/\S+/g,'<span class="danger">$&</span>');

  return h;

}

// ===== メッセージ =====

function addMessage(text,type,isCode=false){

  const chat=document.getElementById("chat");

  const div=document.createElement("div");

  div.className=type;

  if(isCode){

    div.innerHTML="<pre>"+highlightCode(text)+"</pre>";

  }else{

    div.innerText=text;

  }

  chat.appendChild(div);

  chat.scrollTop=chat.scrollHeight;

}

// ===== Base64解除 =====

function decodeBase64(code){

  let out=[];

  let m=code.match(/[A-Za-z0-9+/=]{40,}/g);

  if(m){

    m.forEach(s=>{

      try{

        let d=atob(s);

        if(d.match(/[a-z]/i)) out.push(d);

      }catch{}

    });

  }

  return out;

}

// ===== 解析 =====

function analyze(code){

  let warnings=[];

  let score=0;

  // 危険

  if(code.includes("loadstring")){score+=3;warnings.push("・外部コード実行");}

  if(code.includes("HttpGet")){score+=2;warnings.push("・外部通信");}

  if(code.match(/https?:\/\//)){score+=2;warnings.push("・URLあり");}

  if(code.match(/webhook|request|post/i)){score+=3;warnings.push("・データ送信");}

  // ロガー検出

  let logger=[];

  if(code.match(/LocalPlayer|UserId|Name/i)) logger.push("・ユーザー情報取得");

  if(code.match(/HttpGet|request|webhook/i)) logger.push("・外部送信");

  if(logger.length>=2){

    warnings.push("⚠️ ロガーの可能性");

    score+=3;

  }

  // Roblox判定

  let roblox="🟡 不明";

  if(code.match(/game:|Instance\.new|workspace|Players|Humanoid/i)){

    roblox="🟢 Roblox用";

  }else if(code.match(/require|fs|import/i)){

    roblox="🔴 Robloxではない";

  }

  // Delta判定

  let delta="🟡 不明";

  if(code.includes("loadstring")||code.includes("HttpGet")){

    delta="🟢 実行できる可能性あり";

  }

  // 難読化解除

  let decoded=decodeBase64(code);

  // レベル

  let level="🟢 低リスク";

  if(score>2) level="🟡 注意";

  if(score>5) level="🔴 危険";

  let text="解析結果："+level+"\n\n";

  if(warnings.length){

    text+="注意点:\n"+warnings.join("\n");

  }else{

    text+="目立った危険なし";

  }

  text+="\n\nRoblox判定:\n"+roblox;

  text+="\n\n実行判定:\n"+delta;

  if(decoded.length){

    text+="\n\n難読化解除:\n"+decoded.join("\n\n");

  }

  return text;

}

// ===== URL取得 =====

async function fetchAndAnalyze(url){

  try{

    const r=await fetch(url);

    const code=await r.text();

    addMessage(code,"user",true);

    addMessage(analyze(code),"ai");

  }catch{

    addMessage("URL取得失敗（制限の可能性）","ai");

  }

}

// ===== 送信 =====

function send(){

  const input=document.getElementById("code").value;

  if(!input) return;

  if(input.startsWith("http")){

    fetchAndAnalyze(input);

  }else{

    addMessage(input,"user",true);

    addMessage(analyze(input),"ai");

  }

  document.getElementById("code").value="";

}

// 初期メッセージ

addMessage("コードやURLを貼ると解析します","ai");

</script>

</body>

</html>
